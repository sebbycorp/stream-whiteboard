<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stream Whiteboard</title>
  <style>
    :root { --paper: #f7f6f2; --acc: #3d5a80; }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0; overflow: hidden;
      font: 13px/1.4 system-ui, -apple-system, Segoe UI, sans-serif;
      background: #1a1a1a; color: #eee;
    }

    /* Full-window drawing stage */
    #stage {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 12px;
    }
    canvas {
      display: block;
      background: var(--paper);
      box-shadow: 0 12px 40px rgba(0,0,0,.5);
      border-radius: 4px;
      transform-origin: center center;
      transition: transform .18s ease;
      touch-action: none;
    }

    /* Small floating menu button (top-left). Tints green when connected. */
    #menuBtn {
      position: fixed; top: 12px; left: 12px; z-index: 10;
      width: 34px; height: 34px; border-radius: 8px;
      background: rgba(20,20,20,.72); color: #eee;
      border: 1px solid #3a3a3a; cursor: pointer;
      font-size: 15px; line-height: 1; backdrop-filter: blur(6px);
    }
    #menuBtn.on { border-color: #7dcea0; box-shadow: 0 0 0 2px rgba(125,206,160,.25); }
    #menuBtn:hover { background: rgba(40,40,40,.85); }

    /* Collapsible control panel */
    #panel {
      position: fixed; top: 54px; left: 12px; z-index: 10;
      background: rgba(17,17,17,.92); border: 1px solid #333;
      border-radius: 10px; padding: 12px; width: 260px;
      box-shadow: 0 10px 30px rgba(0,0,0,.5); backdrop-filter: blur(8px);
    }
    #panel[hidden] { display: none; }
    #panel .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
    #panel .row:last-child { margin-bottom: 0; }
    #panel input {
      background: #222; border: 1px solid #444; color: #eee;
      padding: 6px 8px; border-radius: 6px;
    }
    #panel input#host { width: 130px; }
    #panel input#port { width: 62px; }
    #panel button {
      background: var(--acc); color: #fff; border: 0; padding: 7px 12px;
      border-radius: 6px; cursor: pointer; font-weight: 600;
    }
    #panel button.ghost { background: #333; }
    #status { font-size: 12px; color: #aaa; }
    #status.on { color: #7dcea0; }
    #debug { font-size: 11px; color: #7c7c7c; }
  </style>
</head>
<body>
  <button id="menuBtn" title="Show / hide controls">☰</button>
  <div id="panel" hidden>
    <div class="row">
      <input id="host" title="Tablet IP" placeholder="tablet IP" />
      <input id="port" title="Tablet port" />
      <button id="btnApply">Apply</button>
    </div>
    <div class="row">
      <button id="btnClear" class="ghost">Clear</button>
      <button id="btnRotate" class="ghost">Rotate 90°</button>
    </div>
    <div class="row"><span id="status">starting…</span></div>
    <div class="row"><span id="debug">page —×—</span></div>
  </div>

  <div id="stage">
    <canvas id="c" width="1404" height="1872"></canvas>
  </div>

  <script>
    const { invoke } = window.__TAURI__.core;
    const { listen } = window.__TAURI__.event;

    // Palette indexed by the tablet's color id. Order is a best guess for the
    // reMarkable palette; the debug line shows the incoming index (e.g. "c3") so
    // it can be calibrated to your device exactly.
    // 0:black 1:gray 2:lightgray 3:blue 4:red 5:green 6:yellow 7:white 8:purple
    const COLORS = ['#111', '#555', '#9a9a9a', '#2b6cb0', '#c0392b', '#2e7d32', '#e0a800', '#efefef', '#6a4bbf'];
    const WIDTHS = [1.5, 2.5, 4.5];
    const SMOOTH = 0.6; // input low-pass (0..1): lower = smoother, slightly more lag

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const stage = document.getElementById('stage');
    const twin = window.__TAURI__.window; // window API (getCurrentWindow, LogicalSize)
    let pageW = 1404, pageH = 1872;
    let viewRotation = 0; // 0 or 90 — manual view rotation on top of the tablet's orientation
    let lastOrient = null; // 'port' | 'land' — tracks the tablet's current orientation
    let live = new Map(); // id -> {points, tool, color, width}

    // Resize the app window to match the tablet's orientation + aspect, so a
    // landscape toggle on the tablet flips the whole app to landscape too.
    async function resizeWindowToPage() {
      if (!twin || !twin.getCurrentWindow || !twin.LogicalSize) return;
      const LONG = 1200;
      let ww, wh;
      if (pageW >= pageH) { ww = LONG; wh = Math.round(LONG * pageH / pageW); }
      else { wh = LONG; ww = Math.round(LONG * pageW / pageH); }
      try { await twin.getCurrentWindow().setSize(new twin.LogicalSize(ww, wh)); }
      catch (err) { console.warn('setSize failed (window stays put, canvas still fits)', err); }
    }

    // ── UI: menu + status ────────────────────────────────────────────────
    const menuBtn = document.getElementById('menuBtn');
    const panel = document.getElementById('panel');
    function setStatus(t, on) {
      const el = document.getElementById('status');
      if (el) { el.textContent = t; el.classList.toggle('on', !!on); }
      menuBtn.classList.toggle('on', !!on); // button glows green when connected
    }
    // Observed coordinate extents from the tablet — reveals whether strokes fall
    // outside the reported page size (which would clip the corners).
    let bbox = { minx: Infinity, miny: Infinity, maxx: -Infinity, maxy: -Infinity };
    function resetBBox() { bbox = { minx: Infinity, miny: Infinity, maxx: -Infinity, maxy: -Infinity }; }
    function recordCoord(x, y) {
      if (x < bbox.minx) bbox.minx = x;
      if (y < bbox.miny) bbox.miny = y;
      if (x > bbox.maxx) bbox.maxx = x;
      if (y > bbox.maxy) bbox.maxy = y;
    }
    function setDebug(lastTool) {
      const el = document.getElementById('debug');
      if (!el) return;
      if (lastTool !== undefined) setDebug._last = lastTool;
      const b = isFinite(bbox.minx)
        ? `x[${bbox.minx|0}..${bbox.maxx|0}] y[${bbox.miny|0}..${bbox.maxy|0}]`
        : 'x[—] y[—]';
      el.textContent = `page ${pageW}×${pageH} · seen ${b} · last: ${setDebug._last || '—'}`;
    }

    // ── Sizing: fit the page to the window in either orientation ──────────
    function fitCanvas() {
      const availW = stage.clientWidth - 24;
      const availH = stage.clientHeight - 24;
      const rotated = (viewRotation % 180) !== 0;
      const cw = canvas.width, ch = canvas.height;
      // footprint after CSS rotation (swap w/h when rotated 90°)
      const fpW = rotated ? ch : cw;
      const fpH = rotated ? cw : ch;
      const scale = Math.min(availW / fpW, availH / fpH);
      canvas.style.width = (cw * scale) + 'px';
      canvas.style.height = (ch * scale) + 'px';
      canvas.style.transform = `rotate(${viewRotation}deg)`;
    }

    // ── Rendering (smoothed live ink) ─────────────────────────────────────
    function clearPaper() {
      ctx.fillStyle = '#f7f6f2';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      live.clear();
    }
    function isErase(tool) { return !!tool && (String(tool).indexOf('eras') === 0 || tool === 'rubber'); }
    function isHighlight(tool) { return tool === 'hl' || tool === 'highlighter' || tool === 'marker'; }
    function toolWidth(tool, w) {
      if (isHighlight(tool)) return 16;
      if (isErase(tool)) return 30;
      return WIDTHS[Math.min(2, Math.max(0, w | 0))] || 2.5;
    }
    function strokeStyle(tool, color) {
      if (isErase(tool)) return '#f7f6f2';
      if (isHighlight(tool)) return 'rgba(200,200,120,0.35)';
      return COLORS[color | 0] || '#111';
    }
    function mid(a, b) { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }
    function beginStrokeStyle(s) {
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = strokeStyle(s.tool, s.color);
      ctx.lineWidth = toolWidth(s.tool, s.width);
    }
    // Draw the newest smooth segment incrementally: a quadratic curve between
    // consecutive midpoints (control = shared point). Points are pre-smoothed
    // with a low-pass on input, so coalesced ~40 Hz samples render as silky
    // curves with no added latency.
    function drawTail(s) {
      const p = s.points, n = p.length;
      beginStrokeStyle(s);
      if (n === 1) {
        ctx.beginPath();
        ctx.arc(p[0].x, p[0].y, ctx.lineWidth / 2, 0, Math.PI * 2);
        ctx.fillStyle = ctx.strokeStyle;
        ctx.fill();
        return;
      }
      if (n === 2) {
        ctx.beginPath();
        ctx.moveTo(p[0].x, p[0].y);
        ctx.lineTo(p[1].x, p[1].y);
        ctx.stroke();
        return;
      }
      const a = p[n - 3], b = p[n - 2], c = p[n - 1];
      const m1 = mid(a, b), m2 = mid(b, c);
      ctx.beginPath();
      ctx.moveTo(m1.x, m1.y);
      ctx.quadraticCurveTo(b.x, b.y, m2.x, m2.y);
      ctx.stroke();
    }
    function finishStroke(s) {
      const p = s.points, n = p.length;
      if (n < 2) return;
      beginStrokeStyle(s);
      const m = mid(p[n - 2], p[n - 1]);
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(p[n - 1].x, p[n - 1].y);
      ctx.stroke();
    }

    function handle(msg) {
      const t = msg.t;
      if (t === 'hello') {
        pageW = msg.w || 1404; pageH = msg.h || 1872;
        canvas.width = pageW; canvas.height = pageH; // resize + clears bitmap
        clearPaper();
        resetBBox();
        const orient = pageW >= pageH ? 'land' : 'port';
        if (orient !== lastOrient) {
          lastOrient = orient;
          resizeWindowToPage().then(fitCanvas); // flip the window to match, then refit
        } else {
          fitCanvas();
        }
        setStatus(`connected · page ${(msg.page | 0) + 1}/${msg.pages | 1}`, true);
        setDebug('hello');
      } else if (t === 'page') {
        setStatus(`connected · page ${(msg.page | 0) + 1}/${msg.pages | 1}`, true);
      } else if (t === 'clear') {
        clearPaper();
        resetBBox();
        setDebug('clear');
      } else if (t === 'undo') {
        // v1: no per-stroke undo (needs a retained stroke list); ignore.
      } else if (t === 'down') {
        const s = {
          points: [{ x: msg.x, y: msg.y }],
          tool: msg.tool || 'pen',
          color: msg.color | 0,
          width: msg.width | 0,
        };
        live.set(msg.id, s);
        recordCoord(msg.x, msg.y);
        drawTail(s);
        setDebug(`${s.tool} c${s.color}`);
      } else if (t === 'move') {
        const s = live.get(msg.id);
        if (!s) return;
        recordCoord(msg.x, msg.y);
        const prev = s.points[s.points.length - 1];
        // low-pass the incoming sample toward the previous point
        s.points.push({
          x: prev.x + (msg.x - prev.x) * SMOOTH,
          y: prev.y + (msg.y - prev.y) * SMOOTH,
        });
        drawTail(s);
        setDebug();
      } else if (t === 'up') {
        const s = live.get(msg.id);
        if (s) finishStroke(s);
        live.delete(msg.id);
      } else if (t === 'shape') {
        ctx.strokeStyle = COLORS[msg.color | 0] || '#111';
        ctx.lineWidth = WIDTHS[msg.width | 0] || 2;
        const tool = msg.tool || 'rect';
        const x0 = msg.x0, y0 = msg.y0, x1 = msg.x1, y1 = msg.y1;
        ctx.beginPath();
        if (tool === 'rect') {
          ctx.strokeRect(Math.min(x0, x1), Math.min(y0, y1), Math.abs(x1 - x0), Math.abs(y1 - y0));
        } else if (tool === 'circle' || tool === 'oval') {
          const cx = (x0 + x1) / 2, cy = (y0 + y1) / 2, rx = Math.abs(x1 - x0) / 2, ry = Math.abs(y1 - y0) / 2;
          ctx.ellipse(cx, cy, rx || 1, ry || 1, 0, 0, Math.PI * 2);
          ctx.stroke();
        } else if (tool === 'line' || tool === 'arrow') {
          ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
        } else if (tool === 'tri') {
          const ax = (x0 + x1) / 2;
          ctx.moveTo(ax, y0); ctx.lineTo(x0, y1); ctx.lineTo(x1, y1); ctx.closePath(); ctx.stroke();
        }
        setDebug('shape:' + tool);
      }
    }

    // ── Events from the Rust core ─────────────────────────────────────────
    listen('stroke', (e) => {
      try { handle(JSON.parse(e.payload)); }
      catch (err) { console.warn('bad frame', e.payload, err); }
    });
    listen('status', (e) => {
      const s = e.payload;
      if (s.state === 'connected') setStatus(`connected · ${s.host}`, true);
      else if (s.state === 'connecting') setStatus(`connecting to ${s.host}…`, false);
      else setStatus(`reconnecting to ${s.host}…`, false);
    });

    // ── Controls ──────────────────────────────────────────────────────────
    async function applyTablet() {
      const host = document.getElementById('host').value.trim();
      const port = parseInt(document.getElementById('port').value.trim(), 10) || 27182;
      await invoke('set_tablet', { host, port });
      clearPaper();
    }
    async function init() {
      const t = await invoke('get_tablet');
      document.getElementById('host').value = t.host;
      document.getElementById('port').value = t.port;
    }

    menuBtn.onclick = () => { panel.hidden = !panel.hidden; };
    document.getElementById('btnApply').onclick = applyTablet;
    document.getElementById('btnClear').onclick = clearPaper;
    document.getElementById('btnRotate').onclick = () => {
      viewRotation = (viewRotation + 90) % 180; // toggle 0 <-> 90
      fitCanvas();
      setDebug();
    };
    window.addEventListener('resize', fitCanvas);

    clearPaper();
    fitCanvas();
    setDebug();
    init();
  </script>
</body>
</html>
